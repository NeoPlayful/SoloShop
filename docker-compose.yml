version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: soloshop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: soloshop
      POSTGRES_PASSWORD: soloshop
      POSTGRES_DB: soloshop
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soloshop"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: soloshop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: soloshop-server
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./server/src:/app/src
      - ./server/uploads:/app/uploads
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: soloshop-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - server

  nginx:
    image: nginx:alpine
    container_name: soloshop-nginx
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./uploads:/usr/share/nginx/uploads:ro
    depends_on:
      - server
      - frontend
